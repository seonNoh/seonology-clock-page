apiVersion: apps/v1
kind: Deployment
metadata:
  name: seonology-clock-page
  namespace: seonology-apps
  labels:
    app: seonology-clock-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seonology-clock-page
  template:
    metadata:
      labels:
        app: seonology-clock-page
    spec:
      serviceAccountName: seonology-clock-page
      nodeSelector:
        node-type: lightsail
      containers:
      - name: seonology-clock-page
        image: ghcr.io/seonnoh/seonology-clock-page:v1.38.0
        ports:
        - containerPort: 80
          name: http
        - containerPort: 3001
          name: api
        env:
        - name: BOOKMARKS_DIR
          value: /data
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: clock-page-secrets
              key: github-token
              optional: true
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: clock-page-secrets
              key: gemini-api-key
              optional: true
        - name: TAILSCALE_API_KEY
          valueFrom:
            secretKeyRef:
              name: clock-page-secrets
              key: tailscale-api-key
              optional: true
        - name: NAS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: clock-page-secrets
              key: nas-password
              optional: true
        - name: NAS_HOST
          value: "100.94.199.8"
        - name: NAS_PORT
          value: "5001"
        - name: NAS_ACCOUNT
          value: "seon"
        - name: GRAFANA_URL
          value: "http://kube-prometheus-stack-grafana.monitoring:80"
        - name: GRAFANA_USER
          value: "admin"
        - name: GRAFANA_PASS
          value: "grafana-admin-pass"
        volumeMounts:
        - name: bookmarks-data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: bookmarks-data
        persistentVolumeClaim:
          claimName: clock-bookmarks-pvc
